<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VidSnag</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#FBF7F0;            /* warm cream */
    --bg-2:#F3ECE0;
    --card:#FFFFFF;
    --ink:#2C2540;           /* deep plum-ink text */
    --muted:#8A8398;
    --faint:#B6AFC2;
    --line:#EFE7DA;
    --accent:#7C5CFC;        /* friendly purple (matches logo) */
    --accent-2:#9D8BFF;
    --accent-press:#6A49EE;
    --mint:#37D399;
    --peach:#FF9A6C;
    --shadow:0 18px 40px -18px rgba(124,92,252,.45);
    --shadow-soft:0 10px 30px -16px rgba(44,37,64,.30);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Nunito",system-ui,sans-serif;color:var(--ink);
    background:
      radial-gradient(700px 380px at 12% -8%, rgba(124,92,252,.16), transparent 60%),
      radial-gradient(560px 320px at 108% 6%, rgba(55,211,153,.14), transparent 55%),
      var(--bg);
    /* top-align + scroll so the header is never clipped on short windows */
    display:flex;align-items:flex-start;justify-content:center;
    padding:24px;min-height:100%;
    -webkit-user-select:none;user-select:none;overflow-y:auto;overflow-x:hidden;
  }
  .app{width:100%;max-width:500px;margin:auto}

  /* header */
  .head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .logo{width:46px;height:46px;object-fit:contain;
    filter:drop-shadow(0 8px 16px rgba(124,92,252,.4))}
  .brand{font-family:"Baloo 2";font-size:26px;font-weight:800;letter-spacing:-.5px}
  .pill{font-family:"Baloo 2";font-size:12px;font-weight:700;color:#fff;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    padding:3px 12px;border-radius:999px;transform:rotate(-3deg);
    box-shadow:0 6px 14px -6px rgba(124,92,252,.8)}
  .tagline{margin-left:auto;font-size:13px;font-weight:600;color:var(--muted)}

  /* card */
  .card{background:var(--card);border-radius:26px;padding:24px;
    box-shadow:var(--shadow-soft);border:1px solid #F0E9DD}
  label.field{display:block;font-family:"Baloo 2";font-size:13px;font-weight:700;
    color:var(--muted);margin:0 0 8px 4px}

  .input-wrap{position:relative;display:flex;gap:10px}
  .input-wrap .lk{position:absolute;left:15px;top:50%;transform:translateY(-50%);
    width:18px;height:18px;stroke:var(--faint);fill:none;stroke-width:2.2}
  input[type=text]{flex:1;background:var(--bg-2);border:2.5px solid transparent;
    border-radius:15px;color:var(--ink);font-family:"Nunito";font-size:15px;font-weight:600;
    padding:14px 14px 14px 42px;outline:none;transition:border-color .18s,background .18s}
  input[type=text]::placeholder{color:var(--faint);font-weight:600}
  input[type=text]:focus{border-color:var(--accent);background:#fff}

  button{font-family:"Baloo 2";cursor:pointer;border:none;font-weight:700;
    transition:transform .12s cubic-bezier(.34,1.56,.64,1),background .18s,filter .18s,box-shadow .18s}
  button:active{transform:scale(.96)}
  button:disabled{cursor:not-allowed;opacity:.55}
  .btn-ghost{background:var(--bg-2);color:var(--ink);border-radius:15px;
    padding:0 20px;font-size:15px;white-space:nowrap}
  .btn-ghost:hover:not(:disabled){background:#E9E0F6;transform:translateY(-2px)}
  .btn-cta{width:100%;font-size:18px;color:#fff;border-radius:18px;padding:16px;margin-top:4px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:var(--shadow)}
  .btn-cta:hover:not(:disabled){transform:translateY(-3px);filter:brightness(1.05)}

  .divider{height:2px;background:var(--bg-2);border-radius:2px;margin:18px 0}

  /* video meta */
  .meta{display:flex;gap:14px;align-items:center;min-height:62px}
  .thumb{width:108px;height:62px;border-radius:14px;object-fit:cover;background:var(--bg-2);flex-shrink:0;
    box-shadow:var(--shadow-soft)}
  .vtitle{font-family:"Baloo 2";font-size:15px;font-weight:700;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .vsub{font-size:13px;font-weight:600;color:var(--muted);margin-top:3px}
  .placeholder{color:var(--faint);font-size:14px;font-weight:600}

  /* custom dropdown */
  .dd{position:relative;margin-top:16px}
  .dd-btn{width:100%;text-align:left;background:var(--bg-2);border-radius:15px;
    padding:14px 44px 14px 16px;font-family:"Nunito";font-weight:700;font-size:15px;color:var(--ink);
    position:relative}
  .dd-btn:disabled{color:var(--faint)}
  .dd-btn::after{content:"";position:absolute;right:18px;top:50%;width:9px;height:9px;
    border-right:2.5px solid var(--muted);border-bottom:2.5px solid var(--muted);
    transform:translateY(-70%) rotate(45deg);transition:transform .2s}
  .dd.open .dd-btn::after{transform:translateY(-30%) rotate(225deg)}
  .dd-list{position:absolute;left:0;right:0;top:calc(100% + 8px);background:#fff;border-radius:16px;
    box-shadow:0 20px 44px -12px rgba(44,37,64,.35);padding:6px;z-index:20;display:none;
    max-height:230px;overflow:auto}
  .dd.open .dd-list{display:block;animation:pop .16s ease}
  @keyframes pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .dd-item{padding:11px 14px;border-radius:11px;font-weight:700;font-size:14.5px;cursor:pointer}
  .dd-item:hover{background:var(--bg-2)}
  .dd-item.sel{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff}

  /* save-to */
  .saveto{display:flex;align-items:center;gap:10px;margin-top:14px;background:var(--bg-2);
    border-radius:15px;padding:11px 14px}
  .saveto .fl{width:18px;height:18px;stroke:var(--muted);fill:none;stroke-width:2;flex-shrink:0}
  .saveto .path{flex:1;font-size:13px;font-weight:700;color:var(--muted);white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;direction:rtl;text-align:left}
  .saveto button{background:transparent;color:var(--accent);font-size:14px;padding:5px 10px;border-radius:9px}
  .saveto button:hover:not(:disabled){background:#E9E0F6}

  /* progress */
  .progress{height:10px;background:var(--bg-2);border-radius:999px;overflow:hidden;margin-top:18px}
  .bar{height:100%;width:0%;border-radius:999px;
    background:linear-gradient(90deg,var(--accent),var(--mint));transition:width .25s ease}
  .bar.indet{width:35%;animation:slide 1.1s infinite ease-in-out}
  @keyframes slide{0%{margin-left:-35%}100%{margin-left:100%}}
  .status{font-size:13.5px;font-weight:700;color:var(--muted);margin-top:11px;min-height:17px}
  .status.ok{color:var(--mint)} .status.err{color:var(--peach)}

  .foot{text-align:center;color:var(--faint);font-size:12.5px;font-weight:600;margin-top:16px}
  .foot b{color:var(--accent)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <div class="app">
    <div class="head">
      <img class="logo" src="assets/logo-128.png" alt="VidSnag" />
      <span class="brand">VidSnag</span>
      <span class="pill">FREE</span>
      <span class="tagline">runs on your computer</span>
    </div>

    <div class="card">
      <label class="field" for="url">Paste your link</label>
      <div class="input-wrap">
        <svg class="lk" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007 0l3-3a5 5 0 00-7-7l-1 1"/><path d="M14 11a5 5 0 00-7 0l-3 3a5 5 0 007 7l1-1"/></svg>
        <input id="url" type="text" placeholder="YouTube or video link..." autocomplete="off" />
        <button id="fetch" class="btn-ghost">Fetch</button>
      </div>

      <div class="divider"></div>

      <div class="meta">
        <img id="thumb" class="thumb" style="display:none" alt="" />
        <div>
          <div id="vtitle" class="placeholder">Nothing loaded yet, paste a link above!</div>
          <div id="vsub" class="vsub"></div>
        </div>
      </div>

      <div class="dd" id="dd">
        <button class="dd-btn" id="ddBtn" disabled>Quality</button>
        <div class="dd-list" id="ddList"></div>
      </div>

      <div class="saveto">
        <svg class="fl" viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        <span id="folder" class="path" title="">Loading folder...</span>
        <button id="change">Change</button>
      </div>

      <button id="download" class="btn-cta" disabled>Download</button>

      <div class="progress"><div id="bar" class="bar"></div></div>
      <div id="status" class="status">Paste a link and hit Fetch.</div>
    </div>

    <div class="foot">Free forever. If it helps you, you can <b>support it</b> later.</div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  let options = [], selected = 0;

  function setStatus(m,k){const s=$("status");s.textContent=m;s.className="status"+(k?" "+k:"");}
  function bar(p,ind){const b=$("bar");b.classList.toggle("indet",!!ind);if(!ind)b.style.width=(p||0)+"%";}

  // custom dropdown
  function buildDD(){
    const list=$("ddList");list.innerHTML="";
    options.forEach((o,i)=>{
      const el=document.createElement("div");
      el.className="dd-item"+(i===selected?" sel":"");
      el.textContent=o[0];
      el.onclick=()=>{selected=i;$("ddBtn").textContent=o[0];$("dd").classList.remove("open");buildDD();};
      list.appendChild(el);
    });
  }
  $("ddBtn").onclick=()=>{ if(!$("ddBtn").disabled) $("dd").classList.toggle("open"); };
  document.addEventListener("click",e=>{ if(!$("dd").contains(e.target)) $("dd").classList.remove("open"); });

  async function fetchQualities(){
    const url=$("url").value.trim();
    if(!url){setStatus("Paste a link first!","err");return;}
    $("fetch").disabled=true;setStatus("Looking up qualities...");bar(0,true);
    try{
      const r=await window.pywebview.api.probe(url);
      if(r.error)throw new Error(r.error);
      options=r.options;selected=0;
      $("vtitle").textContent=r.title;$("vtitle").className="vtitle";
      $("vsub").textContent=[r.uploader,r.duration_string].filter(Boolean).join("  ·  ");
      if(r.thumbnail){$("thumb").src=r.thumbnail;$("thumb").style.display="block";}
      $("ddBtn").textContent=options[0][0];$("ddBtn").disabled=false;buildDD();
      $("download").disabled=false;
      setStatus("Up to "+r.max_height+"p, pick a quality!");
    }catch(e){setStatus(""+e.message,"err");$("vtitle").textContent="Hmm, couldn't read that link.";}
    finally{$("fetch").disabled=false;bar(0,false);}
  }

  async function startDownload(){
    const url=$("url").value.trim();
    if(!options[selected])return;
    const [,mode,height]=options[selected];
    $("download").disabled=true;$("fetch").disabled=true;bar(0,false);setStatus("Starting...");
    try{const r=await window.pywebview.api.download(url,mode,height);if(r&&r.error)throw new Error(r.error);}
    catch(e){setStatus(""+e.message,"err");$("download").disabled=false;$("fetch").disabled=false;}
  }

  window.onProgress=d=>{if(d.status==="downloading"){bar(d.percent);setStatus("Downloading "+(d.percent||0).toFixed(0)+"%   "+(d.speed||""));}else if(d.status==="processing"){bar(100);setStatus("Almost there, finishing up...");}};
  window.onDone=p=>{bar(100);setStatus("Done! Saved to "+p,"ok");$("download").disabled=false;$("fetch").disabled=false;};
  window.onError=m=>{setStatus(""+m,"err");$("download").disabled=false;$("fetch").disabled=false;};

  function showFolder(p){const el=$("folder");el.textContent=p;el.title=p;}
  async function loadFolder(){try{showFolder(await window.pywebview.api.get_folder());}catch(e){}}
  async function changeFolder(){try{showFolder(await window.pywebview.api.choose_folder());}catch(e){}}

  $("fetch").onclick=fetchQualities;
  $("download").onclick=startDownload;
  $("change").onclick=changeFolder;
  $("url").addEventListener("keydown",e=>{if(e.key==="Enter")fetchQualities();});
  window.addEventListener("pywebviewready",()=>{setStatus("Paste a link and hit Fetch.");loadFolder();});
</script>
</body>
</html>
