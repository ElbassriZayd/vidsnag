name: build-cbl

# PyInstaller build, but with the BOOTLOADER COMPILED FROM SOURCE. AV engines
# carry signatures for the prebuilt PyInstaller bootloader; a freshly compiled
# one isn't in their databases, which can clear signature-based false positives.
# Slim essentials ffmpeg keeps the size down. Manual trigger -> artifact to scan.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install app deps
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Build PyInstaller with a from-source bootloader
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/pyinstaller/pyinstaller.git pyi-src
          Push-Location pyi-src/bootloader
          python ./waf all
          Pop-Location
          pip install ./pyi-src
          python -c "import PyInstaller; print('PyInstaller', PyInstaller.__version__)"

      - name: Fetch slim ffmpeg (essentials)
        shell: pwsh
        run: |
          Invoke-WebRequest "https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-essentials_build.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ff -Force
          $bin = (Get-ChildItem ff -Recurse -Filter ffmpeg.exe | Select-Object -First 1).DirectoryName
          New-Item -ItemType Directory -Force ffbin | Out-Null
          Copy-Item "$bin\ffmpeg.exe" ffbin\ffmpeg.exe
          Copy-Item "$bin\ffprobe.exe" ffbin\ffprobe.exe
          echo "FFMPEG_DIR=$((Resolve-Path ffbin).Path)" >> $env:GITHUB_ENV

      - name: Build VidSnag.exe
        run: pyinstaller vidsnag.spec --noconfirm

      - name: Show result + hash
        shell: pwsh
        run: |
          (Get-FileHash dist/VidSnag.exe -Algorithm SHA256).Hash
          "Size: " + [math]::Round((Get-Item dist/VidSnag.exe).Length/1MB,1) + " MB"

      - uses: actions/upload-artifact@v4
        with:
          name: VidSnag-cbl
          path: dist/VidSnag.exe
          if-no-files-found: error
