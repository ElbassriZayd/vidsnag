name: build

# Reproducible Windows build. Anyone can read this and rebuild the exact .exe,
# which is itself a trust signal. On a version tag it also publishes the build
# to the GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt pyinstaller

      - name: Fetch ffmpeg + ffprobe (essentials, slim)
        shell: pwsh
        run: |
          $url = "https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-essentials_build.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $bin = (Get-ChildItem ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1).DirectoryName
          echo "FFMPEG_DIR=$bin" >> $env:GITHUB_ENV

      - name: Build VidSnag.exe
        run: pyinstaller vidsnag.spec --noconfirm

      # --- Code signing goes here once SignPath Foundation approves the project ---
      # - uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
      #     project-slug: vidsnag
      #     signing-policy-slug: release-signing
      #     artifact-configuration-slug: exe
      #     github-artifact-id: ${{ steps.upload.outputs.artifact-id }}
      #     wait-for-completion: true
      #     output-artifact-directory: dist

      - name: Upload build artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: VidSnag
          path: dist/VidSnag.exe

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VidSnag.exe
