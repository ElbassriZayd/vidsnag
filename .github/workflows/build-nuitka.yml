name: build-nuitka

# Compiles the app with Nuitka (genuine C compilation) instead of PyInstaller,
# to reduce antivirus / SmartScreen false-positives. Manual trigger; uploads an
# artifact to inspect before we promote it to a release.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nuitka:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install nuitka

      - name: Fetch slim ffmpeg (essentials)
        shell: pwsh
        run: |
          Invoke-WebRequest "https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-essentials_build.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ff -Force
          $bin = (Get-ChildItem ff -Recurse -Filter ffmpeg.exe | Select-Object -First 1).DirectoryName
          New-Item -ItemType Directory -Force ffbin | Out-Null
          Copy-Item "$bin\ffmpeg.exe" ffbin\ffmpeg.exe
          Copy-Item "$bin\ffprobe.exe" ffbin\ffprobe.exe
          Get-ChildItem ffbin | ForEach-Object { "{0}  {1:N0} bytes" -f $_.Name, $_.Length }

      - name: Build with Nuitka
        shell: pwsh
        run: |
          python -m nuitka `
            --onefile `
            --assume-yes-for-downloads `
            --msvc=latest `
            --enable-plugin=pywebview `
            --windows-console-mode=disable `
            --windows-icon-from-ico=app/web/assets/vidsnag.ico `
            --include-data-dir=app/web=app/web `
            --include-data-files=ffbin/ffmpeg.exe=app/ffmpeg.exe `
            --include-data-files=ffbin/ffprobe.exe=app/ffprobe.exe `
            --include-package=yt_dlp `
            --include-package-data=yt_dlp `
            --product-name=VidSnag `
            --product-version=0.1.1 `
            --file-version=0.1.1.0 `
            --company-name=VidSnag `
            --file-description="VidSnag - free video downloader" `
            --output-filename=VidSnag.exe `
            --output-dir=dist `
            vidsnag_main.py

      - name: Show result + hash
        shell: pwsh
        run: |
          Get-ChildItem dist
          "SHA-256: " + (Get-FileHash dist/VidSnag.exe -Algorithm SHA256).Hash
          "Size: " + [math]::Round((Get-Item dist/VidSnag.exe).Length/1MB,1) + " MB"

      - uses: actions/upload-artifact@v4
        with:
          name: VidSnag-nuitka
          path: dist/VidSnag.exe
          if-no-files-found: error
